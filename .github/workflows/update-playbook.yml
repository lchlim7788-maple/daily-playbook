name: Update Daily Playbook

on:
  schedule:
    # 12:00 UTC ≈ 美东开盘前(夏令时 EDT 约 08:00 ET / 冬令时 EST 约 07:00 ET)
    # cron 用 UTC,周一至周五。想改时间就改这里的小时数(0-23)。
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}          # 允许在 Actions 页面手动点击运行(用于测试)

permissions:
  contents: write                # 允许工作流把 playbook.json 提交回仓库

concurrency:
  group: playbook
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate playbook.json
        run: python scripts/generate_playbook.py

      - name: Commit & push if changed
        run: |
          git config user.name  "playbook-bot"
          git config user.email "actions@users.noreply.github.com"
          git add playbook.json
          if git diff --quiet --staged; then
            echo "无变化,跳过提交"
          else
            git commit -m "chore: update playbook $(date -u +%F)"
            git push
          fi
